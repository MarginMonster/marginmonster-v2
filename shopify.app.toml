name = "EasyMode"
client_id = "7569bd125783be1a0582dab6760dd34f"
application_url = "https://marginmonster-fiew.onrender.com"
embedded = true

[access_scopes]
# read_products: brand profile + content generation
# write_products: Listing Forge autopilot (write SEO copy back to products)
# write_marketing_events: campaign tracking
# NOTE: read_orders/read_customers intentionally excluded — protected customer
# data that 403s all Admin API access for public apps until PCD approval.
scopes = "read_products,write_products,write_marketing_events"

[auth]
redirect_urls = [
  "https://marginmonster-fiew.onrender.com/auth/callback",
  "https://marginmonster-fiew.onrender.com/auth/shopify/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/shopify/callback"
]

[webhooks]
api_version = "2025-10"

  # Mandatory GDPR / privacy-compliance webhooks (required for App Store review).
  # These are NOT subscription topics — they use their own block with dedicated
  # URL keys. All point at /webhooks, which dispatches by the X-Shopify-Topic header.
  [webhooks.privacy_compliance]
  customer_data_request_url = "https://marginmonster-fiew.onrender.com/webhooks"
  customer_deletion_url = "https://marginmonster-fiew.onrender.com/webhooks"
  shop_deletion_url = "https://marginmonster-fiew.onrender.com/webhooks"

  [[webhooks.subscriptions]]
  topics = ["products/create"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  # billing status sync — handled by APP_SUBSCRIPTIONS_UPDATE in webhooks.tsx
  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri = "/webhooks"

  # abandoned-cart / order webhooks require read_orders (Protected Customer Data),
  # which Shopify REJECTS at deploy time without PCD approval. Re-enable this
  # block (and add read_orders to scopes) once PCD is granted.
  # [[webhooks.subscriptions]]
  # topics = ["checkouts/create", "checkouts/update", "orders/create"]
  # uri = "/webhooks"

# storefront app proxy — powers the email signup popup (POSTs to /proxy/subscribe)
[app_proxy]
url = "https://marginmonster-fiew.onrender.com/proxy"
subpath = "easymode"
prefix = "apps"

[pos]
embedded = false
