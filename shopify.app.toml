name = "EasyMode"
client_id = "7569bd125783be1a0582dab6760dd34f"
application_url = "https://marginmonster-fiew.onrender.com"
embedded = true

[access_scopes]
# read_products: brand profile + content generation
# write_products: Listing Forge autopilot (write SEO copy back to products)
# write_marketing_events: campaign tracking
# NOTE: read_orders/read_customers intentionally excluded — protected customer
# data that 403s all Admin API access for public apps until PCD approval.
scopes = "read_products,write_products,write_marketing_events"

[auth]
redirect_urls = [
  "https://marginmonster-fiew.onrender.com/auth/callback",
  "https://marginmonster-fiew.onrender.com/auth/shopify/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/shopify/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["products/create"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

[app_proxy]
url = "https://marginmonster-fiew.onrender.com/proxy"
subpath = "profit-tracker"
prefix = "apps"

[pos]
embedded = false
