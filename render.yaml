services:
  - type: web
    name: marginmonster
    runtime: docker
    # standard (2GB) — starter's 512MB OOM'd during in-process video assembly;
    # keep this in sync with the instance type set in the Render dashboard.
    plan: standard
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    # Local render cache for videos/photos. This disk is now a FAST CACHE, not
    # the source of truth: when the S3_* vars below are set, every render is
    # mirrored to durable object storage and re-fetched on a cache miss, so
    # Kept content survives even if this disk is resized, detached, or the
    # instance is recreated. Keep it at the size the live disk actually is —
    # Render disks can only GROW; a blueprint requesting a smaller size than the
    # live disk can fail the sync. To grow it, bump this AND apply the resize in
    # the Render dashboard (Disks) — don't rely on the blueprint alone.
    disk:
      name: renders
      mountPath: /app/data/renders
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,read_customers,read_products,write_marketing_events
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      # Durable object storage for renders (Cloudflare R2 / AWS S3 / any
      # S3-compatible). Set all four to make Kept content survive disk changes;
      # leave unset to fall back to local-disk-only (original behavior).
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto
