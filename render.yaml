services:
  - type: web
    name: marginmonster
    runtime: docker
    # standard (2GB) — starter's 512MB OOM'd during in-process video assembly;
    # keep this in sync with the instance type set in the Render dashboard.
    plan: standard
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    # Durable storage for rendered videos — WITHOUT this, Render's ephemeral
    # container disk wipes data/renders on every deploy (videos 404 on refresh,
    # and auto-posting can't fetch them). Mounted at the app's data/renders.
    disk:
      name: renders
      mountPath: /app/data/renders
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,read_customers,read_products,write_marketing_events
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
