services:
  - type: web
    name: marginmonster
    runtime: docker
    # standard (2GB) — starter's 512MB OOM'd during in-process video assembly;
    # keep this in sync with the instance type set in the Render dashboard.
    plan: standard
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    # Durable storage for rendered videos/photos — persists across deploys so
    # Kept content is safe. Keep this at the size the live disk actually is:
    # Render disks can only GROW, never shrink, and a blueprint requesting a
    # smaller size than the live disk can fail the sync. To grow it, bump this
    # AND confirm/apply the resize in the Render dashboard (Disks) — don't rely
    # on the blueprint alone.
    disk:
      name: renders
      mountPath: /app/data/renders
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,read_customers,read_products,write_marketing_events
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
