services:
  - type: web
    name: marginmonster
    runtime: docker
    # standard (2GB) — starter's 512MB OOM'd during in-process video assembly;
    # keep this in sync with the instance type set in the Render dashboard.
    plan: standard
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    # Durable storage for rendered videos/photos — WITHOUT this, Render's
    # ephemeral container disk would wipe data/renders on every deploy (videos
    # 404 on refresh, auto-posting can't fetch them). This disk PERSISTS across
    # deploys/restarts, so Kept content is safe. It's shared across all shops on
    # this single instance and Kept content grows unbounded, so it's sized with
    # real headroom; the worker logs usage and warns before it fills. Object
    # storage (R2/S3) is the next step for redundancy + multi-instance/standalone.
    # NOTE: Render disks can grow but never shrink — confirm the resize applied
    # in the Render dashboard after this deploys.
    disk:
      name: renders
      mountPath: /app/data/renders
      sizeGB: 50
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,read_customers,read_products,write_marketing_events
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
